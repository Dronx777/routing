<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Мобильный навигатор</title>

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

#map{
height:100vh;
width:100vw;
}

#controls{
position:absolute;
z-index:1200;
top:10px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:6px;
border-radius:10px;
display:flex;
gap:6px;
flex-wrap:wrap;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

#controls button{
padding:6px 8px;
border-radius:6px;
border:1px solid #ccc;
background:#f7f7f7;
cursor:pointer;
}

#info-box{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:rgba(255,255,255,0.95);
padding:6px 10px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.3);
font-size:14px;
}

.marker-label{
font-size:12px;
font-weight:bold;
color:#000;
white-space:nowrap;
}

</style>
</head>

<body>

<div id="controls">

<input type="file" id="csvFile" accept=".csv">

<button id="locBtn">GPS</button>

<button id="refreshBtn">Обновить</button>

<button id="clearBtn">Очистить</button>

<button id="downloadBtn">Сохранить</button>

</div>

<div id="info-box">

<b>Маршрут</b><br>

<span id="info-distance">Длина: —</span><br>

<span id="info-duration">Время: —</span>

</div>

<div id="map"></div>

<script>

// карта
const map = L.map('map',{zoomControl:false}).setView([51.16,71.47],12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.control.zoom({position:'bottomleft'}).addTo(map);


// слои
let csvMarkersLayer=L.layerGroup().addTo(map);

let routeLayer=L.layerGroup().addTo(map);


// данные
let csvData=[];

let csvFileName='';


// GPS
let userMarker=null;

let userCoords=null;

let userRadius=null;

let autoFollow=true;


// отключаем слежение если карту двигают
map.on('movestart zoomstart',()=>{
autoFollow=false;
});


// центрирование
function centerOnUser(zoom=15){

if(userCoords){

map.flyTo(userCoords,zoom,{duration:1});

}

}


// GPS старт
function requestUserLocation(){

navigator.geolocation.watchPosition(updateUserPosition);

}


// обновление GPS
function updateUserPosition(pos){

userCoords=[pos.coords.latitude,pos.coords.longitude];

if(!userMarker){

userMarker=L.circleMarker(userCoords,{
radius:6,
color:'#0077cc',
fillColor:'#0077cc',
fillOpacity:0.9
}).addTo(map);

}
else{

userMarker.setLatLng(userCoords);

}


if(!userRadius){

userRadius=L.circle(userCoords,{
radius:50,
color:'black',
weight:1,
fillOpacity:0
}).addTo(map);

}
else{

userRadius.setLatLng(userCoords);

}


checkPointsInUserRadius();

if(autoFollow){

centerOnUser(15);

}

}


// проверка радиуса
function checkPointsInUserRadius(){

if(!userCoords) return;

csvData.forEach(p=>{

if(p.status==="0"){

const d=L.latLng(userCoords).distanceTo([p.lat,p.lon]);

if(d<=50){

p.status="1";

if(p.marker){

p.marker.setStyle({
color:'green',
fillColor:'green'
});

}

}

}

});

}


// построение маршрута
function buildOptimizedRoute(){

routeLayer.clearLayers();

let points=csvData
.filter(p=>p.status==="0")
.map(p=>[Number(p.lat),Number(p.lon)]);

if(points.length===0) return;

const coordStr=points.map(c=>`${c[1]},${c[0]}`).join(';');

fetch(`https://router.project-osrm.org/trip/v1/driving/${coordStr}?source=first&roundtrip=false&overview=full&geometries=geojson`)

.then(r=>r.json())

.then(json=>{

if(!json.trips||!json.trips.length) return;

const trip=json.trips[0];

L.geoJSON(trip.geometry,{
style:{color:'#0077cc',weight:3}
}).addTo(routeLayer);

document.getElementById('info-distance')
.textContent=`Длина: ${(trip.distance/1000).toFixed(2)} км`;

document.getElementById('info-duration')
.textContent=`${Math.round(trip.duration/60)} мин`;

});

}


// загрузка CSV
document.getElementById('csvFile').addEventListener('change',function(e){

const file=e.target.files[0];

if(!file) return;

csvFileName=file.name;

Papa.parse(file,{

header:true,
skipEmptyLines:true,

complete:function(res){

csvMarkersLayer.clearLayers();

routeLayer.clearLayers();

csvData=[];

(res.data||[]).forEach((r,i)=>{

const lat=r.lat||r.latitude;

const lon=r.lon||r.longitude;

const status=String(r.status)==="1"?"1":"0";

const count=r.count||"";

const color=status==="0"?'red':'green';

const marker=L.circleMarker([lat,lon],{
radius:6,
color:color,
fillColor:color,
fillOpacity:0.8
}).addTo(csvMarkersLayer);

const point={
lat,
lon,
status,
count,
marker
};

csvData.push(point);


// подпись count
if(count!==""){

L.marker([lat,lon],{

icon:L.divIcon({
className:'marker-label',
html:count,
iconSize:[30,12],
iconAnchor:[15,30]
}),

interactive:false

}).addTo(csvMarkersLayer);

}

});


buildOptimizedRoute();

}

});

});


// кнопки

document.getElementById('locBtn').addEventListener('click',()=>{

autoFollow=true;

requestUserLocation();

});


document.getElementById('refreshBtn').addEventListener('click',()=>{

buildOptimizedRoute();

});


document.getElementById('clearBtn').addEventListener('click',()=>{

csvMarkersLayer.clearLayers();

routeLayer.clearLayers();

csvData=[];

});


document.getElementById('downloadBtn').addEventListener('click',()=>{

if(!csvData.length) return;

const csv=Papa.unparse(csvData);

const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});

const url=URL.createObjectURL(blob);

const a=document.createElement('a');

a.href=url;

a.download=csvFileName||'points.csv';

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

URL.revokeObjectURL(url);

});

</script>

</body>
</html>
