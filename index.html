<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Мобильный навигатор с OSRM Trip</title>

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

#map{
height:100vh;
width:100vw;
}

#file-input{
position:absolute;
z-index:1200;
left:50%;
transform:translateX(-50%);
top:10px;
background:#fff;
padding:6px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
display:flex;
gap:6px;
align-items:center;
flex-wrap:wrap;
max-width:95%;
}

#file-input button{
font-size:14px;
padding:6px 8px;
border-radius:6px;
border:1px solid #ccc;
background:#f7f7f7;
cursor:pointer;
}

#info-box{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:rgba(255,255,255,0.95);
padding:6px 10px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.3);
font-size:14px;
}

.marker-label{
font-size:12px;
font-weight:bold;
color:#000;
white-space:nowrap;
}

</style>
</head>

<body>

<div id="file-input">

<input type="file" id="csvFile" accept=".csv"/>

<button id="locBtn">GPS</button>

<button id="refreshBtn">Обновить</button>

<button id="clearBtn">Очистить</button>

<button id="downloadBtn">Сохранить</button>

</div>

<div id="info-box">

<b>Маршрут</b><br>

<span id="info-distance">Длина: —</span><br>

<span id="info-duration">Время: —</span>

</div>

<div id="map"></div>

<script>

const map = L.map('map',{zoomControl:false}).setView([51.16,71.47],12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.control.zoom({position:'bottomleft'}).addTo(map);

let csvMarkersLayer = L.layerGroup().addTo(map);

let routeLayer = L.layerGroup().addTo(map);

let csvData=[];

let userMarker=null;

let userCoords=null;

let userRadius=null;

let csvFileName='';

const infoDistanceEl=document.getElementById('info-distance');

const infoDurationEl=document.getElementById('info-duration');


// ================= GPS =================

function requestUserLocation(){

navigator.geolocation.watchPosition(updateUserPosition);

}


function updateUserPosition(pos){

userCoords=[pos.coords.latitude,pos.coords.longitude];

if(!userMarker){

userMarker=L.circleMarker(userCoords,{
radius:6,
color:'#0077cc',
fillColor:'#0077cc',
fillOpacity:0.8
}).addTo(map);

}

else{

userMarker.setLatLng(userCoords);

}

if(!userRadius){

userRadius=L.circle(userCoords,{
radius:50,
color:'black',
weight:1,
fillOpacity:0
}).addTo(map);

}

else{

userRadius.setLatLng(userCoords);

}

checkPointsInUserRadius();

}


// ================= радиус точек =================

function checkPointsInUserRadius(){

if(!userCoords) return;

csvData.forEach(p=>{

if(p.status==="0"){

const d = L.latLng(userCoords).distanceTo([p.lat,p.lon]);

if(d<=50){

p.status="1";

if(p.marker){

p.marker.setStyle({
color:'green',
fillColor:'green'
});

}

}

}

});

}


// ================= построение маршрута =================

function buildOptimizedRoute(){

routeLayer.clearLayers();

let points = csvData
.filter(p=>p.status==="0")
.map(p=>[Number(p.lat),Number(p.lon)]);

if(points.length===0){

infoDistanceEl.textContent='Длина: —';

infoDurationEl.textContent='Время: —';

return;

}

const coordStr = points.map(c=>`${c[1]},${c[0]}`).join(';');

fetch(`https://router.project-osrm.org/trip/v1/driving/${coordStr}?source=first&roundtrip=false&overview=full&geometries=geojson`)

.then(r=>r.json())

.then(json=>{

if(!json.trips || !json.trips.length) return;

const trip=json.trips[0];

L.geoJSON(trip.geometry,{
style:{color:'#0077cc',weight:3}
}).addTo(routeLayer);

const km=(trip.distance/1000).toFixed(2);

infoDistanceEl.textContent=`Длина: ${km} км`;

const min=Math.round(trip.duration/60);

infoDurationEl.textContent=`${min} мин`;

});

}


// ================= загрузка CSV =================

document.getElementById('csvFile').addEventListener('change',function(ev){

const file=ev.target.files[0];

if(!file) return;

csvFileName=file.name;

Papa.parse(file,{

header:true,

skipEmptyLines:true,

complete:function(results){

csvMarkersLayer.clearLayers();

routeLayer.clearLayers();

csvData=[];

(results.data||[]).forEach((r,i)=>{

const lat=r.lat||r.latitude;

const lon=r.lon||r.longitude;

const status = String(r.status)==="1" ? "1" : "0";

const comment=r.comment||"";

const count=r.count||"";

const color=status==="0"?'red':'green';

const marker=L.circleMarker([lat,lon],{

radius:6,

color:color,

fillColor:color,

fillOpacity:0.8

}).addTo(csvMarkersLayer);


// сохраняем маркер

csvData.push({

lat,

lon,

status,

comment,

count,

marker

});


// подпись count

if(count!==""){

L.marker([lat,lon],{

icon:L.divIcon({

className:'marker-label',

html:count,

iconSize:[30,12],

iconAnchor:[15,30]

}),

interactive:false

}).addTo(csvMarkersLayer);

}

});

buildOptimizedRoute();

}

});

});


// ================= кнопки =================

document.getElementById('refreshBtn')

.addEventListener('click',()=>{

buildOptimizedRoute();

});


document.getElementById('locBtn')

.addEventListener('click',()=>{

requestUserLocation();

});


document.getElementById('clearBtn')

.addEventListener('click',()=>{

csvMarkersLayer.clearLayers();

routeLayer.clearLayers();

csvData=[];

document.getElementById('csvFile').value='';

});


document.getElementById('downloadBtn').addEventListener('click',()=>{

if(!csvData.length){

alert('Нет данных');

return;

}

const csv=Papa.unparse(csvData);

const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});

const url=URL.createObjectURL(blob);

const link=document.createElement('a');

link.href=url;

link.download=csvFileName||'updated.csv';

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

URL.revokeObjectURL(url);

});

</script>

</body>
</html>
